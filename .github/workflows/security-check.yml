name: 安全校验

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      release_mode:
        description: '发布模式（额外检查版本/tag一致性）'
        type: boolean
        default: false

jobs:
  security-check:
    name: 推送安全校验
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 安装系统依赖 (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: 安装 npm 依赖
        run: npm ci

      - name: 运行推送前安全校验
        id: check
        run: node scripts/pre-push-check.mjs ${{ github.event.inputs.release_mode == 'true' && '--release' || '' }}
        continue-on-error: true

      - name: 报告校验结果
        if: always()
        run: |
          if [ ${{ steps.check.outcome }} = 'success' ]; then
            echo "✅ 安全校验通过"
          else
            echo "❌ 安全校验发现阻断项，请查看上方日志"
            exit 1
          fi
